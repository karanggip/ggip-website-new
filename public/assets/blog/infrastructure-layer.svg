<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgIL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a1e"/>
      <stop offset="50%" stop-color="#1a1740"/>
      <stop offset="100%" stop-color="#2D2A6E"/>
    </linearGradient>
    <linearGradient id="layerA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(91,127,255,0.25)"/>
      <stop offset="50%" stop-color="rgba(91,127,255,0.45)"/>
      <stop offset="100%" stop-color="rgba(91,127,255,0.18)"/>
    </linearGradient>
    <linearGradient id="layerB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(167,139,250,0.22)"/>
      <stop offset="50%" stop-color="rgba(167,139,250,0.42)"/>
      <stop offset="100%" stop-color="rgba(167,139,250,0.16)"/>
    </linearGradient>
    <linearGradient id="layerC" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(45,42,110,0.6)"/>
      <stop offset="50%" stop-color="rgba(91,127,255,0.55)"/>
      <stop offset="100%" stop-color="rgba(45,42,110,0.4)"/>
    </linearGradient>
    <radialGradient id="glowIL" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#5B7FFF" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#5B7FFF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#5B7FFF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="gridIL" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#5B7FFF" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bgIL)"/>
  <rect width="1600" height="900" fill="url(#gridIL)"/>
  <ellipse cx="800" cy="500" rx="640" ry="380" fill="url(#glowIL)"/>

  <!-- Three stacked horizontal layers (pyramid: narrowest top, widest base) -->
  <!-- Top layer: Engines (Application) -->
  <g transform="translate(540,210)">
    <rect width="520" height="100" rx="14" fill="url(#layerA)" stroke="rgba(91,127,255,0.55)" stroke-width="1.5"/>
    <text x="32" y="60" font-family="'Plus Jakarta Sans', sans-serif" font-size="22" font-weight="700" fill="#ffffff" opacity="0.92">Engines</text>
    <text x="32" y="84" font-family="'General Sans', sans-serif" font-size="12" fill="#ffffff" opacity="0.55" letter-spacing="2">APPLICATION LAYER</text>
    <!-- Mini dots representing engines -->
    <g transform="translate(380,52)">
      <circle cx="0" cy="0" r="7" fill="#5B7FFF"/>
      <circle cx="22" cy="0" r="7" fill="#A78BFA"/>
      <circle cx="44" cy="0" r="5" fill="#5B7FFF" opacity="0.55"/>
      <circle cx="64" cy="0" r="5" fill="#A78BFA" opacity="0.45"/>
      <circle cx="84" cy="0" r="4" fill="#5B7FFF" opacity="0.3"/>
    </g>
  </g>

  <!-- Middle layer: AI / Intelligence -->
  <g transform="translate(400,355)">
    <rect width="800" height="100" rx="14" fill="url(#layerB)" stroke="rgba(167,139,250,0.5)" stroke-width="1.5"/>
    <text x="32" y="60" font-family="'Plus Jakarta Sans', sans-serif" font-size="22" font-weight="700" fill="#ffffff" opacity="0.92">AI &amp; Intelligence</text>
    <text x="32" y="84" font-family="'General Sans', sans-serif" font-size="12" fill="#ffffff" opacity="0.55" letter-spacing="2">INTELLIGENCE LAYER</text>
    <!-- Neural-net style nodes -->
    <g transform="translate(580,50)" stroke="#A78BFA" stroke-opacity="0.6" fill="#A78BFA" fill-opacity="0.9">
      <circle cx="0" cy="-20" r="4"/>
      <circle cx="0" cy="20" r="4"/>
      <circle cx="60" cy="-30" r="4"/>
      <circle cx="60" cy="0" r="4"/>
      <circle cx="60" cy="30" r="4"/>
      <circle cx="120" cy="-10" r="4"/>
      <circle cx="120" cy="20" r="4"/>
      <line x1="0" y1="-20" x2="60" y2="-30" stroke-opacity="0.45"/>
      <line x1="0" y1="-20" x2="60" y2="0" stroke-opacity="0.35"/>
      <line x1="0" y1="20" x2="60" y2="0" stroke-opacity="0.35"/>
      <line x1="0" y1="20" x2="60" y2="30" stroke-opacity="0.45"/>
      <line x1="60" y1="-30" x2="120" y2="-10" stroke-opacity="0.45"/>
      <line x1="60" y1="0" x2="120" y2="-10" stroke-opacity="0.35"/>
      <line x1="60" y1="0" x2="120" y2="20" stroke-opacity="0.35"/>
      <line x1="60" y1="30" x2="120" y2="20" stroke-opacity="0.45"/>
    </g>
  </g>

  <!-- Bottom layer: Data Infrastructure (widest) -->
  <g transform="translate(220,500)">
    <rect width="1160" height="140" rx="16" fill="url(#layerC)" stroke="rgba(91,127,255,0.6)" stroke-width="1.5"/>
    <text x="36" y="62" font-family="'Plus Jakarta Sans', sans-serif" font-size="26" font-weight="800" fill="#ffffff" opacity="0.96">Proprietary data infrastructure</text>
    <text x="36" y="92" font-family="'General Sans', sans-serif" font-size="13" fill="#ffffff" opacity="0.6" letter-spacing="2">FOUNDATION LAYER</text>
    <text x="36" y="118" font-family="'General Sans', sans-serif" font-size="12" fill="#ffffff" opacity="0.42">100+ IP offices · Cleaned · Structured · Real-time</text>
    <!-- Globe-of-offices dot row -->
    <g transform="translate(820,80)" fill="#5B7FFF">
      <g opacity="0.9"><circle cx="0" cy="0" r="3"/><circle cx="20" cy="-6" r="3"/><circle cx="40" cy="2" r="3"/><circle cx="60" cy="-4" r="3"/><circle cx="80" cy="0" r="3"/><circle cx="100" cy="6" r="3"/><circle cx="120" cy="-2" r="3"/><circle cx="140" cy="4" r="3"/><circle cx="160" cy="-8" r="3"/><circle cx="180" cy="2" r="3"/><circle cx="200" cy="0" r="3"/><circle cx="220" cy="-6" r="3"/><circle cx="240" cy="6" r="3"/><circle cx="260" cy="0" r="3"/><circle cx="280" cy="-4" r="3"/></g>
    </g>
  </g>

  <!-- Connecting lines between layers — "shared infrastructure" -->
  <g stroke="rgba(91,127,255,0.35)" stroke-width="1" stroke-dasharray="4 6">
    <line x1="640" y1="310" x2="540" y2="355"/>
    <line x1="800" y1="310" x2="800" y2="355"/>
    <line x1="960" y1="310" x2="1060" y2="355"/>
    <line x1="500" y1="455" x2="380" y2="500"/>
    <line x1="800" y1="455" x2="800" y2="500"/>
    <line x1="1100" y1="455" x2="1220" y2="500"/>
  </g>

  <!-- Construction crane motif (subtle, top-right) — represents "building" -->
  <g transform="translate(1280,150)" stroke="#A78BFA" stroke-opacity="0.55" fill="none" stroke-width="1.5">
    <line x1="0" y1="0" x2="0" y2="160" stroke-opacity="0.5"/>
    <line x1="-90" y1="20" x2="120" y2="20"/>
    <line x1="-90" y1="20" x2="-40" y2="40"/>
    <line x1="120" y1="20" x2="40" y2="40"/>
    <line x1="-40" y1="40" x2="40" y2="40"/>
    <line x1="60" y1="20" x2="60" y2="50" stroke-dasharray="3 4"/>
    <rect x="50" y="50" width="22" height="16" fill="#A78BFA" fill-opacity="0.25" stroke-opacity="0.6"/>
  </g>
</svg>
