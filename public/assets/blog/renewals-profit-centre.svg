<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgRP" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a1e"/>
      <stop offset="50%" stop-color="#2a1f5e"/>
      <stop offset="100%" stop-color="#5B3FA8"/>
    </linearGradient>
    <radialGradient id="profitGlow" cx="78%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#A78BFA" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="costGlow" cx="22%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#DC2626" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#DC2626" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#DC2626" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="profitBar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#5B7FFF"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="costBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.05)"/>
    </linearGradient>
    <pattern id="gridRP" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#5B7FFF" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bgRP)"/>
  <rect width="1600" height="900" fill="url(#gridRP)"/>
  <rect width="1600" height="900" fill="url(#costGlow)"/>
  <rect width="1600" height="900" fill="url(#profitGlow)"/>

  <!-- Baseline axis -->
  <line x1="120" y1="720" x2="1480" y2="720" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- LEFT: Cost-center descending bars (traditional providers eating margin) -->
  <g transform="translate(120,420)">
    <text x="0" y="-40" font-family="'Plus Jakarta Sans', sans-serif" font-size="14" font-weight="700" fill="rgba(255,255,255,0.55)" letter-spacing="3">COST CENTRE</text>
    <text x="0" y="-16" font-family="'General Sans', sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">Margin lost to providers</text>
    <!-- Descending bars (height shrinks left to right) -->
    <g fill="url(#costBar)" stroke="rgba(255,255,255,0.12)" stroke-width="1">
      <rect x="0"   y="60"  width="46" height="240" rx="6"/>
      <rect x="62"  y="100" width="46" height="200" rx="6"/>
      <rect x="124" y="140" width="46" height="160" rx="6"/>
      <rect x="186" y="180" width="46" height="120" rx="6"/>
      <rect x="248" y="220" width="46" height="80"  rx="6"/>
      <rect x="310" y="250" width="46" height="50"  rx="6"/>
    </g>
    <!-- Label "PROVIDER FEES" overlay -->
    <text x="0" y="330" font-family="'General Sans', sans-serif" font-size="11" fill="rgba(255,255,255,0.3)" letter-spacing="2">PROVIDER FEES</text>
  </g>

  <!-- Curved "FLIP" arrow connecting cost → profit -->
  <g transform="translate(540,360)">
    <path d="M 0 60 C 100 -40, 240 -40, 340 60" fill="none" stroke="url(#profitBar)" stroke-width="3" stroke-linecap="round" stroke-dasharray="0"/>
    <polygon points="340,60 332,52 332,68" fill="#A78BFA"/>
    <text x="170" y="-10" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-size="20" font-weight="800" fill="#fff" letter-spacing="4">THE FLIP</text>
  </g>

  <!-- RIGHT: Profit-driver ascending bars -->
  <g transform="translate(1000,420)">
    <text x="0" y="-40" font-family="'Plus Jakarta Sans', sans-serif" font-size="14" font-weight="700" fill="#A78BFA" letter-spacing="3">PROFIT CENTRE</text>
    <text x="0" y="-16" font-family="'General Sans', sans-serif" font-size="12" fill="rgba(255,255,255,0.5)">Margin captured by the firm</text>
    <!-- Ascending bars (height grows left to right) -->
    <g fill="url(#profitBar)" stroke="rgba(167,139,250,0.4)" stroke-width="1">
      <rect x="0"   y="240" width="46" height="60"  rx="6"/>
      <rect x="62"  y="190" width="46" height="110" rx="6"/>
      <rect x="124" y="140" width="46" height="160" rx="6"/>
      <rect x="186" y="90"  width="46" height="210" rx="6"/>
      <rect x="248" y="40"  width="46" height="260" rx="6"/>
      <rect x="310" y="-10" width="46" height="310" rx="6"/>
    </g>
    <!-- Highlight pulse glow on the tallest bar -->
    <rect x="310" y="-10" width="46" height="310" rx="6" fill="none" stroke="#A78BFA" stroke-opacity="0.6" stroke-width="1.5"/>
    <text x="0" y="330" font-family="'General Sans', sans-serif" font-size="11" fill="rgba(255,255,255,0.5)" letter-spacing="2">REVENUE LINE</text>
  </g>

  <!-- Headline figure: "+$35k" floating callout -->
  <g transform="translate(1260,180)">
    <rect x="-110" y="-40" width="220" height="76" rx="14" fill="rgba(13,13,26,0.7)" stroke="rgba(167,139,250,0.5)" stroke-width="1.5"/>
    <text x="0" y="-2" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-size="34" font-weight="800" fill="#A78BFA" letter-spacing="-1">+$35k</text>
    <text x="0" y="24" text-anchor="middle" font-family="'General Sans', sans-serif" font-size="11" fill="rgba(255,255,255,0.55)" letter-spacing="2">ANNUAL MARGIN UPLIFT</text>
  </g>

  <!-- Subtle dollar mark in corner -->
  <text x="60" y="100" font-family="'Plus Jakarta Sans', sans-serif" font-size="120" font-weight="800" fill="#ffffff" opacity="0.05" letter-spacing="-6">$</text>
</svg>
